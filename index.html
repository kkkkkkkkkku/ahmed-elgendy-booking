<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>حجز عام 2027 | الأستاذ أحمد الجندي</title>

    <style>

        * {
            box-sizing: border-box;
            font-family: Tahoma, Arial, sans-serif;
        }

        body {

            margin: 0;

            min-height: 100vh;

            padding: 25px 12px;

            background:
                linear-gradient(
                    135deg,
                    #052e16,
                    #14532d,
                    #166534,
                    #064e3b
                );

            color: #17251c;

        }

        .container {

            max-width: 680px;

            margin: auto;

        }

        .form-card {

            background: #f8fff9;

            border-radius: 25px;

            padding: 25px;

            box-shadow:
                0 15px 50px
                rgba(0, 0, 0, 0.35);

        }

        .header {

            text-align: center;

            margin-bottom: 25px;

        }

        .header img {

            width: 140px;

            height: 140px;

            object-fit: cover;

            border-radius: 50%;

            border: 6px solid #166534;

            box-shadow:
                0 0 0 8px #dcfce7;

        }

        h1 {

            color: #14532d;

            font-size: 26px;

            margin: 18px 0 8px;

        }

        h2 {

            color: #166534;

            font-size: 19px;

            margin: 8px 0;

        }

        .description {

            color: #466052;

            line-height: 1.8;

            font-size: 15px;

        }

        label {

            display: block;

            margin-top: 18px;

            margin-bottom: 7px;

            font-weight: bold;

            color: #14532d;

        }

        input,
        select {

            width: 100%;

            padding: 14px;

            border: 1px solid #a7c9b0;

            border-radius: 13px;

            font-size: 16px;

            background: white;

            outline: none;

        }

        input:focus,
        select:focus {

            border-color: #15803d;

            box-shadow:
                0 0 0 3px
                rgba(21, 128, 61, 0.15);

        }

        .hidden {

            display: none;

        }

        .submit-btn {

            width: 100%;

            border: none;

            padding: 17px;

            margin-top: 28px;

            border-radius: 14px;

            background:
                linear-gradient(
                    135deg,
                    #14532d,
                    #15803d
                );

            color: white;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;

        }

        .submit-btn:hover {

            background:
                linear-gradient(
                    135deg,
                    #052e16,
                    #166534
                );

        }

        .note {

            text-align: center;

            color: #5b7061;

            font-size: 13px;

            margin-top: 18px;

        }

    </style>

</head>


<body>


<div class="container">


    <div class="form-card">


        <div class="header">


            <img
                src="ahmed-elgendy.jpg.jpeg"
                alt="الأستاذ أحمد الجندي"
            >


            <h1>
                🧠📐 حجز عام 2027 🧮📚
            </h1>


            <h2>
                مادة الرياضيات مع العبقري الأستاذ أحمد الجندي
            </h2>


            <div class="description">

                ✨ لجميع طلاب المرحلة الإعدادية والثانوية

                <br>

                🧮 الرياضيات بفهم وذكاء وإتقان

                <br>

                🚀 املأ بياناتك للتواصل معك بخصوص الحجز

            </div>


        </div>


        <form
            action="https://formspree.io/f/xjgnrvgd"
            method="POST"
        >


            <input
                type="hidden"
                name="_subject"
                value="🚀 حجز جديد - رياضيات 2027"
            >


            <label>
                👤 الاسم بالكامل
            </label>


            <input
                type="text"
                name="الاسم بالكامل"
                placeholder="اكتب اسمك بالكامل"
                required
            >


            <label>
                🎓 المرحلة الدراسية
            </label>


            <select
                id="stage"
                name="المرحلة الدراسية"
                required
            >

                <option value="">
                    اختر المرحلة
                </option>

                <option value="إعدادي">
                    📘 إعدادي
                </option>

                <option value="ثانوي">
                    📚 ثانوي
                </option>

            </select>


            <label>
                🏫 الصف الدراسي
            </label>


            <select
                name="الصف الدراسي"
                required
            >

                <option value="">
                    اختر الصف
                </option>

                <option value="الصف الأول">
                    الصف الأول
                </option>

                <option value="الصف الثاني">
                    الصف الثاني
                </option>

                <option value="الصف الثالث">
                    الصف الثالث
                </option>

            </select>


            <div
                id="secondaryTypeBox"
                class="hidden"
            >


                <label>
                    🔬 الشعبة
                </label>


                <select
                    id="secondaryType"
                    name="الشعبة"
                >

                    <option value="">
                        اختر الشعبة
                    </option>

                    <option value="علمي">
                        🧪 علمي
                    </option>

                    <option value="أدبي">
                        📖 أدبي
                    </option>

                </select>


            </div>


            <label>
                📱 رقم الموبايل المصري
            </label>


            <input
                type="tel"
                name="رقم الموبايل"
                placeholder="مثال: 01012345678"
                pattern="01[0125][0-9]{8}"
                maxlength="11"
                minlength="11"
                required
            >


            <label>
                🎂 العمر
            </label>


            <input
                type="number"
                name="العمر"
                min="10"
                max="30"
                placeholder="اكتب عمرك"
                required
            >


            <label>
                📍 المنطقة
            </label>


            <select
                name="المنطقة"
                required
            >

                <option value="">
                    اختر منطقتك
                </option>

                <option>
                    البدرشين
                </option>

                <option>
                    الحوامدية
                </option>

                <option>
                    أم خنان
                </option>

                <option>
                    الشيخ عتمان
                </option>

                <option>
                    المنوات
                </option>

                <option>
                    طموه
                </option>

                <option>
                    بولاق
                </option>

                <option>
                    المنيل
                </option>

                <option>
                    أبو النمرس
                </option>

                <option>
                    المنيب
                </option>

                <option>
                    الجيزة
                </option>

                <option>
                    الهرم
                </option>

                <option>
                    فيصل
                </option>

                <option>
                    الطالبية
                </option>

            </select>


            <label>
                🏢 السنتر الأقرب إليك
            </label>


            <select
                name="السنتر الأقرب"
                required
            >

                <option value="">
                    اختر السنتر الأقرب إليك
                </option>


                <option>
                    سنتر الفضل
                </option>


                <option>
                    سنتر الأستاذ
                </option>


                <option>
                    سنتر بداية
                </option>


                <option>
                    سنتر البهنساوي
                </option>


                <option>
                    سنتر سمارت فيصل
                </option>


                <option>
                    H.M — البدرشين
                </option>


                <option>
                    المهندس — طموه
                </option>


                <option>
                    برافوا — طموه
                </option>


                <option>
                    النوابغ — سقارة
                </option>


            </select>


            <button
                type="submit"
                class="submit-btn"
            >

                🚀 إرسال طلب الحجز

            </button>


        </form>


        <div class="note">

            🔒 بياناتك تستخدم فقط للتواصل معك بخصوص الحجز

        </div>


    </div>


</div>


<script>


    const stage =
        document.getElementById("stage");


    const secondaryTypeBox =
        document.getElementById(
            "secondaryTypeBox"
        );


    const secondaryType =
        document.getElementById(
            "secondaryType"
        );


    stage.addEventListener(
        "change",
        function () {


            if (
                this.value === "ثانوي"
            ) {


                secondaryTypeBox
                    .classList
                    .remove("hidden");


                secondaryType.required =
                    true;


            }


            else {


                secondaryTypeBox
                    .classList
                    .add("hidden");


                secondaryType.required =
                    false;


                secondaryType.value =
                    "";

            }


        }

    );


</script>


</body>

</html>
